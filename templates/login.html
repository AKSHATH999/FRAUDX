<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FRAUDX Login</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* LOGIN BOX */
.login-box {
    width: 350px;
    padding: 30px;
    border-radius: 16px;
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    text-align: center;
    color: white;
}

.login-box h2 {
    color: #38bdf8;
    margin-bottom: 20px;
}

/* INPUTS */
input {
    width: 90%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 10px;
    outline: none;
    background: #0f172a;
    color: white;
}

/* BUTTON */
button {
    width: 95%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #38bdf8;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0ea5e9;
    transform: scale(1.03);
}

/* SMALL TEXT */
p {
    margin-top: 15px;
    font-size: 14px;
    color: #94a3b8;
}

a {
    color: #38bdf8;
    text-decoration: none;
}
</style>

</head>

<body>

<div class="login-box">

    <h2>⚡ FRAUDX LOGIN</h2>

    <form method="POST">

        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

    <p>New user? <a href="/register">Create account</a></p>

</div>

</body>
</html>
